<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mis Tareas</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,500;1,9..144,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --surface2: #222222;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.15);
    --text: #e8e4dc;
    --text2: #888880;
    --text3: #555550;
    --accent: #c8b89a;
    --accent2: #a89070;
    --red: #e05c4a;
    --red-bg: rgba(224,92,74,0.1);
    --amber: #d4943a;
    --amber-bg: rgba(212,148,58,0.1);
    --green: #6aaa6e;
    --green-bg: rgba(106,170,110,0.1);
    --blue: #5a9bc8;
    --blue-bg: rgba(90,155,200,0.1);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

  /* layout */
  .shell {
    display: grid;
    grid-template-columns: 220px 1fr;
    grid-template-rows: 48px 1fr;
    height: 100vh;
    gap: 0;
  }

  /* topbar */
  .topbar {
    grid-column: 1 / -1;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
  }
  .topbar-logo {
    font-family: 'Fraunces', serif;
    font-size: 16px;
    font-weight: 300;
    color: var(--accent);
    letter-spacing: 0.02em;
  }
  .topbar-right {
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .topbar-date {
    color: var(--text3);
    font-size: 11px;
  }
  .notif-btn {
    background: none;
    border: 1px solid var(--border2);
    color: var(--text2);
    padding: 4px 12px;
    border-radius: 4px;
    cursor: pointer;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    transition: all 0.15s;
  }
  .notif-btn:hover { border-color: var(--accent); color: var(--accent); }
  .notif-btn.active { border-color: var(--green); color: var(--green); background: var(--green-bg); }

  /* sidebar */
  .sidebar {
    border-right: 1px solid var(--border);
    padding: 20px 0;
    overflow-y: auto;
    background: var(--bg);
  }
  .sidebar-section {
    padding: 0 12px;
    margin-bottom: 24px;
  }
  .sidebar-label {
    font-size: 10px;
    color: var(--text3);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 0 8px;
    margin-bottom: 6px;
  }
  .sidebar-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 7px 8px;
    border-radius: 6px;
    cursor: pointer;
    color: var(--text2);
    transition: all 0.12s;
    border: 1px solid transparent;
  }
  .sidebar-item:hover { color: var(--text); background: var(--surface); }
  .sidebar-item.active { color: var(--accent); background: rgba(200,184,154,0.06); border-color: rgba(200,184,154,0.15); }
  .sidebar-item-left { display: flex; align-items: center; gap: 8px; }
  .sidebar-icon { width: 14px; text-align: center; font-size: 12px; }
  .sidebar-count {
    font-size: 10px;
    background: var(--surface2);
    padding: 1px 6px;
    border-radius: 10px;
    color: var(--text3);
  }
  .sidebar-count.has-items { background: rgba(200,184,154,0.1); color: var(--accent2); }

  .add-task-btn {
    margin: 0 12px;
    width: calc(100% - 24px);
    padding: 8px;
    background: rgba(200,184,154,0.08);
    border: 1px dashed rgba(200,184,154,0.25);
    border-radius: 6px;
    color: var(--accent2);
    cursor: pointer;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    transition: all 0.15s;
    text-align: center;
  }
  .add-task-btn:hover { background: rgba(200,184,154,0.14); border-style: solid; color: var(--accent); }

  /* main */
  .main {
    overflow-y: auto;
    padding: 24px;
    background: var(--bg);
  }

  .main-header {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    margin-bottom: 20px;
  }
  .main-title {
    font-family: 'Fraunces', serif;
    font-size: 28px;
    font-weight: 300;
    color: var(--text);
    line-height: 1;
  }
  .main-subtitle {
    font-size: 11px;
    color: var(--text3);
    margin-top: 4px;
  }

  /* search */
  .search-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 12px;
    margin-bottom: 16px;
    transition: border-color 0.15s;
  }
  .search-bar:focus-within { border-color: var(--border2); }
  .search-bar input {
    background: none;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    flex: 1;
  }
  .search-bar input::placeholder { color: var(--text3); }
  .search-icon { color: var(--text3); font-size: 12px; }

  /* task cards */
  .task-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    margin-bottom: 6px;
    cursor: pointer;
    transition: border-color 0.15s, transform 0.15s;
    overflow: hidden;
  }
  .task-card:hover { border-color: var(--border2); transform: translateX(2px); }
  .task-card.expanded { border-color: var(--border2); }
  .task-card.done { opacity: 0.42; }
  .task-card.p-high:not(.done) { border-left: 3px solid var(--red); }
  .task-card.p-med:not(.done) { border-left: 3px solid var(--amber); }
  .task-card.p-low:not(.done) { border-left: 3px solid var(--green); }

  .task-top {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 14px;
  }

  .check-circle {
    width: 18px;
    height: 18px;
    border-radius: 50%;
    border: 1.5px solid var(--text3);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    cursor: pointer;
  }
  .check-circle:hover { border-color: var(--accent); }
  .check-circle.done { background: var(--green); border-color: var(--green); }
  .check-circle.done::after {
    content: '';
    width: 4px;
    height: 8px;
    border: 1.5px solid #0f0f0f;
    border-top: none;
    border-left: none;
    transform: rotate(45deg) translateY(-1px);
    display: block;
  }

  .task-info { flex: 1; min-width: 0; }
  .task-name {
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .task-name.done { text-decoration: line-through; color: var(--text3); }
  .task-tags {
    display: flex;
    gap: 6px;
    margin-top: 4px;
    flex-wrap: wrap;
  }
  .tag {
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 3px;
    font-weight: 400;
  }
  .tag-overdue { background: var(--red-bg); color: var(--red); }
  .tag-today { background: var(--amber-bg); color: var(--amber); }
  .tag-soon { background: var(--blue-bg); color: var(--blue); }
  .tag-future { background: rgba(255,255,255,0.05); color: var(--text3); }
  .tag-p-high { background: var(--red-bg); color: var(--red); }
  .tag-p-med { background: var(--amber-bg); color: var(--amber); }
  .tag-p-low { background: var(--green-bg); color: var(--green); }

  /* expanded detail */
  .task-detail {
    display: none;
    padding: 0 14px 14px;
    border-top: 1px solid var(--border);
    margin-top: 0;
    animation: slideDown 0.18s ease;
  }
  .task-detail.open {
    display: block;
  }
  @keyframes slideDown { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: translateY(0); } }
  .detail-desc {
    color: var(--text2);
    font-size: 12px;
    line-height: 1.7;
    margin: 12px 0;
    white-space: pre-wrap;
    font-family: 'Fraunces', serif;
    font-style: italic;
  }
  .detail-meta {
    display: flex;
    gap: 16px;
    margin-bottom: 12px;
    flex-wrap: wrap;
  }
  .meta-item { font-size: 11px; color: var(--text3); }
  .meta-item span { color: var(--text2); }
  .detail-actions {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }
  .action-btn {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    padding: 5px 12px;
    border-radius: 5px;
    border: 1px solid var(--border2);
    background: transparent;
    color: var(--text2);
    cursor: pointer;
    transition: all 0.12s;
  }
  .action-btn:hover { color: var(--text); border-color: var(--accent); }
  .action-btn.delete:hover { color: var(--red); border-color: var(--red); background: var(--red-bg); }

  /* empty */
  .empty {
    text-align: center;
    padding: 40px 20px;
    color: var(--text3);
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-size: 15px;
  }

  /* modal */
  .modal-bg {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 1000;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(2px);
  }
  .modal-bg.open { display: flex; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 14px;
    padding: 28px;
    width: 440px;
    max-width: 95vw;
    animation: popIn 0.2s ease;
  }
  @keyframes popIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
  .modal-title {
    font-family: 'Fraunces', serif;
    font-size: 20px;
    font-weight: 300;
    color: var(--text);
    margin-bottom: 20px;
  }
  .field { margin-bottom: 14px; }
  .field label {
    display: block;
    font-size: 10px;
    color: var(--text3);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 5px;
  }
  .field input, .field textarea, .field select {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 7px;
    padding: 9px 12px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    outline: none;
    transition: border-color 0.15s;
  }
  .field input:focus, .field textarea:focus, .field select:focus { border-color: var(--accent2); }
  .field textarea { resize: vertical; min-height: 80px; line-height: 1.6; }
  .field select option { background: #222; }
  .modal-footer {
    display: flex;
    justify-content: flex-end;
    gap: 8px;
    margin-top: 20px;
  }
  .btn-cancel {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    padding: 7px 16px;
    border-radius: 6px;
    border: 1px solid var(--border2);
    background: transparent;
    color: var(--text2);
    cursor: pointer;
  }
  .btn-save {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    padding: 7px 20px;
    border-radius: 6px;
    border: 1px solid var(--accent2);
    background: rgba(200,184,154,0.12);
    color: var(--accent);
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-save:hover { background: rgba(200,184,154,0.2); }

  /* toasts */
  .toast-area {
    position: fixed;
    bottom: 20px;
    right: 20px;
    z-index: 2000;
    display: flex;
    flex-direction: column;
    gap: 8px;
    pointer-events: none;
  }
  .toast {
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: 8px;
    padding: 10px 16px;
    font-size: 12px;
    color: var(--text);
    animation: toastIn 0.2s ease;
    pointer-events: all;
    display: flex;
    align-items: center;
    gap: 8px;
    max-width: 280px;
  }
  @keyframes toastIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .toast-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }

  /* stats row */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    margin-bottom: 20px;
  }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
  }
  .stat-num {
    font-family: 'Fraunces', serif;
    font-size: 22px;
    font-weight: 300;
    color: var(--text);
    line-height: 1;
  }
  .stat-label {
    font-size: 10px;
    color: var(--text3);
    margin-top: 3px;
    letter-spacing: 0.06em;
  }
  .stat-card.alert .stat-num { color: var(--red); }
  .stat-card.warn .stat-num { color: var(--amber); }
</style>
</head>
<body>

<div class="shell">
  <!-- topbar -->
  <div class="topbar">
    <div class="topbar-logo">✦ tareas</div>
    <div class="topbar-right">
      <span class="topbar-date" id="topDate"></span>
      <span id="syncStatus" style="font-size:11px;color:var(--text3);cursor:pointer" onclick="openSettings()" title="configurar sync con GitHub">solo local</span>
      <button class="notif-btn" onclick="openSettings()">⚙ sync</button>
      <button class="notif-btn" id="notifToggle" onclick="toggleNotifications()">notificaciones</button>
    </div>
  </div>

  <!-- sidebar -->
  <div class="sidebar">
    <div class="sidebar-section">
      <div class="sidebar-label">vistas</div>
      <div class="sidebar-item active" onclick="setView('all', this)">
        <div class="sidebar-item-left"><span class="sidebar-icon">◈</span> todas</div>
        <span class="sidebar-count has-items" id="cnt-all">0</span>
      </div>
      <div class="sidebar-item" onclick="setView('today', this)">
        <div class="sidebar-item-left"><span class="sidebar-icon">◎</span> hoy</div>
        <span class="sidebar-count" id="cnt-today">0</span>
      </div>
      <div class="sidebar-item" onclick="setView('pending', this)">
        <div class="sidebar-item-left"><span class="sidebar-icon">◷</span> pendientes</div>
        <span class="sidebar-count" id="cnt-pending">0</span>
      </div>
      <div class="sidebar-item" onclick="setView('overdue', this)">
        <div class="sidebar-item-left"><span class="sidebar-icon">⚑</span> vencidas</div>
        <span class="sidebar-count" id="cnt-overdue">0</span>
      </div>
      <div class="sidebar-item" onclick="setView('done', this)">
        <div class="sidebar-item-left"><span class="sidebar-icon">✓</span> completadas</div>
        <span class="sidebar-count" id="cnt-done">0</span>
      </div>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-label">prioridad</div>
      <div class="sidebar-item" onclick="setView('high', this)">
        <div class="sidebar-item-left"><span class="sidebar-icon" style="color:var(--red)">●</span> alta</div>
        <span class="sidebar-count" id="cnt-high">0</span>
      </div>
      <div class="sidebar-item" onclick="setView('med', this)">
        <div class="sidebar-item-left"><span class="sidebar-icon" style="color:var(--amber)">●</span> media</div>
        <span class="sidebar-count" id="cnt-med">0</span>
      </div>
      <div class="sidebar-item" onclick="setView('low', this)">
        <div class="sidebar-item-left"><span class="sidebar-icon" style="color:var(--green)">●</span> baja</div>
        <span class="sidebar-count" id="cnt-low">0</span>
      </div>
    </div>
    <button class="add-task-btn" onclick="openModal()">+ nueva tarea</button>
  </div>

  <!-- main -->
  <div class="main">
    <div class="main-header">
      <div>
        <div class="main-title" id="viewTitle">todas las tareas</div>
        <div class="main-subtitle" id="viewSub"></div>
      </div>
      <button class="notif-btn" onclick="openModal()" style="font-size:12px;padding:6px 14px;">+ nueva</button>
    </div>

    <div class="stats-row" id="statsRow"></div>

    <div class="search-bar">
      <span class="search-icon">⌕</span>
      <input type="text" id="searchInput" placeholder="buscar tarea..." oninput="render()">
    </div>

    <div id="taskList"></div>
  </div>
</div>

<!-- modal -->
<div class="modal-bg" id="modalBg" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-title" id="modalTitle">nueva tarea</div>
    <div class="field">
      <label>título *</label>
      <input type="text" id="f-title" placeholder="¿qué hay que hacer?">
    </div>
    <div class="field">
      <label>descripción / notas</label>
      <textarea id="f-desc" placeholder="detalles, contexto, links..."></textarea>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
      <div class="field">
        <label>fecha límite</label>
        <input type="date" id="f-date">
      </div>
      <div class="field">
        <label>prioridad</label>
        <select id="f-priority">
          <option value="high">🔴 alta</option>
          <option value="med" selected>🟡 media</option>
          <option value="low">🟢 baja</option>
        </select>
      </div>
    </div>
    <div class="field">
      <label>categoría (opcional)</label>
      <input type="text" id="f-cat" placeholder="trabajo, personal, proyecto...">
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal()">cancelar</button>
      <button class="btn-save" onclick="saveTask()">guardar tarea</button>
    </div>
  </div>
</div>

<!-- toasts -->
<div class="toast-area" id="toastArea"></div>

<script>
const STORAGE = 'tareas-app-v2';
const NOTIF_KEY = 'tareas-notif';
let tasks = [];
let currentView = 'all';
let editingId = null;
let expandedId = null;
let notifsEnabled = false;

// ── GITHUB GIST SYNC ─────────────────────────────────────────────
// Pon aquí tu token y gist_id después de crearlos (ver instrucciones)
const GH_TOKEN  = localStorage.getItem('gh_token')  || '';
const GIST_FILE = 'tareas-app.json';
let   gistId    = localStorage.getItem('gh_gist_id') || '';
let   syncing   = false;

async function gistLoad() {
  if (!GH_TOKEN || !gistId) return false;
  try {
    const r = await fetch(`https://api.github.com/gists/${gistId}`,
      { headers: { Authorization: `token ${GH_TOKEN}`, Accept: 'application/vnd.github+json' } });
    if (!r.ok) return false;
    const d = await r.json();
    const content = d.files?.[GIST_FILE]?.content;
    if (content) { tasks = JSON.parse(content); return true; }
  } catch(e) {}
  return false;
}

async function gistSave() {
  if (!GH_TOKEN) return;
  const body = { files: { [GIST_FILE]: { content: JSON.stringify(tasks) } } };
  if (!gistId) {
    // crear gist nuevo
    const r = await fetch('https://api.github.com/gists',
      { method:'POST', headers:{ Authorization:`token ${GH_TOKEN}`, 'Content-Type':'application/json' },
        body: JSON.stringify({ description:'Mis Tareas App', public: false, files: body.files }) });
    if (r.ok) { const d = await r.json(); gistId = d.id; localStorage.setItem('gh_gist_id', gistId); }
  } else {
    await fetch(`https://api.github.com/gists/${gistId}`,
      { method:'PATCH', headers:{ Authorization:`token ${GH_TOKEN}`, 'Content-Type':'application/json' },
        body: JSON.stringify(body) });
  }
}

async function saveTasks() {
  localStorage.setItem(STORAGE, JSON.stringify(tasks));
  if (GH_TOKEN) {
    syncing = true; updateSyncIcon('saving');
    await gistSave();
    syncing = false; updateSyncIcon('ok');
    setTimeout(() => updateSyncIcon('idle'), 2000);
  }
}

function updateSyncIcon(state) {
  const el = document.getElementById('syncStatus');
  if (!el) return;
  if (state === 'saving') { el.textContent = '↑ guardando...'; el.style.color = 'var(--amber)'; }
  else if (state === 'ok')  { el.textContent = '✓ sincronizado'; el.style.color = 'var(--green)'; }
  else if (state === 'err') { el.textContent = '✗ sin sync';    el.style.color = 'var(--red)'; }
  else                      { el.textContent = GH_TOKEN ? '⟳ gist sync' : 'solo local'; el.style.color = 'var(--text3)'; }
}

function openSettings() {
  const tok = prompt('Pega tu GitHub Personal Access Token (scope: gist):\n\n(déjalo vacío para usar solo localStorage)', localStorage.getItem('gh_token')||'');
  if (tok === null) return;
  localStorage.setItem('gh_token', tok.trim());
  if (tok.trim()) {
    const gid = prompt('ID de tu Gist (déjalo vacío para crear uno nuevo automáticamente):', localStorage.getItem('gh_gist_id')||'');
    if (gid !== null) localStorage.setItem('gh_gist_id', gid.trim());
  }
  toast('configuración guardada', 'recarga la página para aplicar', 'var(--accent)');
}
// ─────────────────────────────────────────────────────────────────

// Init
async function init() {
  updateDate();
  setInterval(updateDate, 60000);
  setInterval(checkReminders, 60000);
  loadNotifState();

  // intentar cargar desde Gist primero, si no desde localStorage
  const fromGist = await gistLoad();
  if (!fromGist) {
    try { tasks = JSON.parse(localStorage.getItem(STORAGE)) || []; } catch(e) { tasks = []; }
  }
  if (!tasks.length) loadSamples();
  updateSyncIcon('idle');
  render();
  setTimeout(checkReminders, 1500);
}

function todayStr() { return new Date().toISOString().split('T')[0]; }

function updateDate() {
  const now = new Date();
  const days = ['domingo','lunes','martes','miércoles','jueves','viernes','sábado'];
  const months = ['enero','feb','marzo','abril','mayo','junio','julio','agosto','sep','oct','nov','dic'];
  document.getElementById('topDate').textContent =
    `${days[now.getDay()]}, ${now.getDate()} de ${months[now.getMonth()]} ${now.getFullYear()}`;
}

function loadTasks() {
  try { tasks = JSON.parse(localStorage.getItem(STORAGE)) || []; } catch(e) { tasks = []; }
}

function loadNotifState() {
  notifsEnabled = localStorage.getItem(NOTIF_KEY) === '1';
  updateNotifBtn();
}

function loadSamples() {
  const t = todayStr();
  const add = (d, n) => { const x = new Date(); x.setDate(x.getDate()+n); return x.toISOString().split('T')[0]; };
  tasks = [
    { id: 1, title: 'Revisar informe Q1', desc: 'Revisar los números del trimestre y preparar el resumen ejecutivo para la reunión del lunes.', date: add(t,-1), priority: 'high', cat: 'trabajo', done: false, created: Date.now() },
    { id: 2, title: 'Reunión con equipo de diseño', desc: 'Confirmar los wireframes del nuevo dashboard y alinear con desarrollo.', date: t, priority: 'med', cat: 'trabajo', done: false, created: Date.now() },
    { id: 3, title: 'Renovar seguro del auto', desc: '', date: add(t,3), priority: 'med', cat: 'personal', done: false, created: Date.now() },
    { id: 4, title: 'Configurar pipeline CI/CD', desc: 'Deploy automático en staging. Ver doc en Notion.', date: add(t,1), priority: 'high', cat: 'proyecto', done: false, created: Date.now() },
    { id: 5, title: 'Enviar propuesta a cliente', desc: 'Propuesta ya lista, solo enviar por correo.', date: add(t,-2), priority: 'high', cat: 'trabajo', done: true, created: Date.now() },
  ];
  saveTasks();
}

function getDateStatus(date) {
  if (!date) return null;
  const t = todayStr();
  if (date < t) return 'overdue';
  if (date === t) return 'today';
  const diff = (new Date(date) - new Date(t)) / 86400000;
  return diff <= 3 ? 'soon' : 'future';
}

function fmtDate(date) {
  if (!date) return '';
  const [y,m,d] = date.split('-');
  const ms = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
  return `${parseInt(d)} ${ms[parseInt(m)-1]} ${y}`;
}

function getFiltered() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  return tasks.filter(t => {
    const matchQ = !q || t.title.toLowerCase().includes(q) || (t.desc||'').toLowerCase().includes(q) || (t.cat||'').toLowerCase().includes(q);
    if (!matchQ) return false;
    const ds = getDateStatus(t.date);
    if (currentView === 'all') return true;
    if (currentView === 'today') return t.date === todayStr() && !t.done;
    if (currentView === 'pending') return !t.done;
    if (currentView === 'overdue') return ds === 'overdue' && !t.done;
    if (currentView === 'done') return t.done;
    if (currentView === 'high') return t.priority === 'high' && !t.done;
    if (currentView === 'med') return t.priority === 'med' && !t.done;
    if (currentView === 'low') return t.priority === 'low' && !t.done;
    return true;
  });
}

const viewTitles = {
  all: 'todas las tareas', today: 'para hoy', pending: 'pendientes',
  overdue: 'vencidas', done: 'completadas', high: 'prioridad alta',
  med: 'prioridad media', low: 'prioridad baja'
};

function render() {
  const list = document.getElementById('taskList');
  const filtered = getFiltered();
  const t = todayStr();

  // counts
  const all = tasks.length;
  const pending = tasks.filter(x=>!x.done).length;
  const done = tasks.filter(x=>x.done).length;
  const overdue = tasks.filter(x=>!x.done && x.date && x.date < t).length;
  const today = tasks.filter(x=>!x.done && x.date===t).length;
  const high = tasks.filter(x=>!x.done && x.priority==='high').length;
  const med = tasks.filter(x=>!x.done && x.priority==='med').length;
  const low = tasks.filter(x=>!x.done && x.priority==='low').length;

  const setCount = (id, n, warn) => {
    const el = document.getElementById(id);
    el.textContent = n;
    el.className = 'sidebar-count' + (n>0 ? ' has-items' : '') + (warn && n>0 ? ' warn' : '');
    if (warn && n > 0) el.style.background = 'var(--red-bg)', el.style.color = 'var(--red)';
    else el.style.background = '', el.style.color = '';
  };
  setCount('cnt-all', all); setCount('cnt-today', today, true);
  setCount('cnt-pending', pending); setCount('cnt-overdue', overdue, true);
  setCount('cnt-done', done); setCount('cnt-high', high);
  setCount('cnt-med', med); setCount('cnt-low', low);

  // title
  document.getElementById('viewTitle').textContent = viewTitles[currentView] || 'tareas';
  document.getElementById('viewSub').textContent = `${filtered.length} tarea${filtered.length!==1?'s':''}`;

  // stats row
  const statsEl = document.getElementById('statsRow');
  statsEl.innerHTML = `
    <div class="stat-card${overdue>0?' alert':''}"><div class="stat-num">${overdue}</div><div class="stat-label">vencidas</div></div>
    <div class="stat-card${today>0?' warn':''}"><div class="stat-num">${today}</div><div class="stat-label">para hoy</div></div>
    <div class="stat-card"><div class="stat-num">${pending}</div><div class="stat-label">pendientes</div></div>
    <div class="stat-card"><div class="stat-num">${done}</div><div class="stat-label">completadas</div></div>
  `;

  if (!filtered.length) {
    list.innerHTML = '<div class="empty">nada por aquí...</div>';
    return;
  }

  // sort: overdue first, then today, then by date
  const sorted = [...filtered].sort((a,b) => {
    if (a.done !== b.done) return a.done ? 1 : -1;
    const da = getDateStatus(a.date), db = getDateStatus(b.date);
    const order = {overdue:0, today:1, soon:2, future:3, null:4};
    if (order[da] !== order[db]) return order[da] - order[db];
    return (a.date||'z') < (b.date||'z') ? -1 : 1;
  });

  list.innerHTML = sorted.map(task => {
    const ds = getDateStatus(task.date);
    const isExp = expandedId === task.id;
    const dateBadge = task.date ? `<span class="tag tag-${ds||'future'}">${fmtDate(task.date)}${ds==='overdue'?' · vencida':ds==='today'?' · hoy':''}</span>` : '';
    const priBadge = `<span class="tag tag-p-${task.priority}">${task.priority==='high'?'alta':task.priority==='med'?'media':'baja'}</span>`;
    const catBadge = task.cat ? `<span class="tag" style="background:rgba(255,255,255,0.05);color:var(--text3)">${task.cat}</span>` : '';

    return `<div class="task-card p-${task.priority}${task.done?' done':''}${isExp?' expanded':''}" id="tc-${task.id}">
      <div class="task-top" onclick="toggleExpand(${task.id})">
        <div class="check-circle${task.done?' done':''}" onclick="toggleDone(event,${task.id})"></div>
        <div class="task-info">
          <div class="task-name${task.done?' done':''}">${task.title}</div>
          <div class="task-tags">${dateBadge}${priBadge}${catBadge}</div>
        </div>
      </div>
      <div class="task-detail${isExp?' open':''}">
        <p class="detail-desc">${task.desc || 'sin descripción adicional.'}</p>
        <div class="detail-meta">
          ${task.date ? `<div class="meta-item">fecha límite: <span>${fmtDate(task.date)}</span></div>` : ''}
          <div class="meta-item">prioridad: <span>${task.priority==='high'?'alta':task.priority==='med'?'media':'baja'}</span></div>
          ${task.cat ? `<div class="meta-item">categoría: <span>${task.cat}</span></div>` : ''}
        </div>
        <div class="detail-actions">
          <button class="action-btn" onclick="openEdit(${task.id})">editar</button>
          <button class="action-btn" onclick="toggleDone(event,${task.id})">${task.done?'reabrir':'completar'}</button>
          <button class="action-btn delete" onclick="deleteTask(${task.id})">eliminar</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

function toggleExpand(id) {
  expandedId = expandedId === id ? null : id;
  render();
  if (expandedId) {
    setTimeout(() => {
      const el = document.getElementById('tc-'+id);
      if (el) el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }, 50);
  }
}

function toggleDone(e, id) {
  e.stopPropagation();
  const t = tasks.find(x=>x.id===id);
  if (t) { t.done = !t.done; saveTasks(); render(); toast(t.done?'✓ completada':'↺ reabierta', t.title); }
}

function deleteTask(id) {
  const t = tasks.find(x=>x.id===id);
  if (!confirm(`¿Eliminar "${t?.title}"?`)) return;
  tasks = tasks.filter(x=>x.id!==id);
  if (expandedId===id) expandedId=null;
  saveTasks(); render(); toast('eliminada', t?.title||'', 'var(--red)');
}

function setView(v, el) {
  currentView = v;
  document.querySelectorAll('.sidebar-item').forEach(x=>x.classList.remove('active'));
  el.classList.add('active');
  expandedId = null;
  render();
}

function openModal(id) {
  editingId = null;
  document.getElementById('modalTitle').textContent = 'nueva tarea';
  document.getElementById('f-title').value = '';
  document.getElementById('f-desc').value = '';
  document.getElementById('f-date').value = todayStr();
  document.getElementById('f-priority').value = 'med';
  document.getElementById('f-cat').value = '';
  document.getElementById('modalBg').classList.add('open');
  setTimeout(()=>document.getElementById('f-title').focus(), 80);
}

function openEdit(id) {
  const t = tasks.find(x=>x.id===id);
  if (!t) return;
  editingId = id;
  document.getElementById('modalTitle').textContent = 'editar tarea';
  document.getElementById('f-title').value = t.title;
  document.getElementById('f-desc').value = t.desc||'';
  document.getElementById('f-date').value = t.date||'';
  document.getElementById('f-priority').value = t.priority||'med';
  document.getElementById('f-cat').value = t.cat||'';
  document.getElementById('modalBg').classList.add('open');
  setTimeout(()=>document.getElementById('f-title').focus(), 80);
}

function closeModal() { document.getElementById('modalBg').classList.remove('open'); }

function saveTask() {
  const title = document.getElementById('f-title').value.trim();
  if (!title) { document.getElementById('f-title').style.borderColor='var(--red)'; return; }
  document.getElementById('f-title').style.borderColor='';
  const data = { title, desc: document.getElementById('f-desc').value.trim(), date: document.getElementById('f-date').value, priority: document.getElementById('f-priority').value, cat: document.getElementById('f-cat').value.trim() };
  if (editingId) {
    const t = tasks.find(x=>x.id===editingId);
    if (t) Object.assign(t, data);
    toast('✓ tarea actualizada', data.title);
  } else {
    tasks.unshift({ id: Date.now(), done: false, created: Date.now(), ...data });
    toast('✓ tarea creada', data.title);
  }
  saveTasks(); closeModal(); render();
}

// Notifications
function toggleNotifications() {
  if (!notifsEnabled) {
    if ('Notification' in window) {
      Notification.requestPermission().then(p => {
        if (p === 'granted') {
          notifsEnabled = true;
          localStorage.setItem(NOTIF_KEY, '1');
          updateNotifBtn();
          toast('notificaciones activadas', 'recibirás alertas de tareas vencidas');
        } else {
          toast('permiso denegado', 'habilita notificaciones en el navegador', 'var(--amber)');
        }
      });
    }
  } else {
    notifsEnabled = false;
    localStorage.setItem(NOTIF_KEY, '0');
    updateNotifBtn();
    toast('notificaciones desactivadas', '');
  }
}

function updateNotifBtn() {
  const btn = document.getElementById('notifToggle');
  btn.textContent = notifsEnabled ? '🔔 notificaciones on' : 'notificaciones';
  btn.className = 'notif-btn' + (notifsEnabled ? ' active' : '');
}

function checkReminders() {
  const t = todayStr();
  const overdue = tasks.filter(x => !x.done && x.date && x.date < t);
  const todayT = tasks.filter(x => !x.done && x.date === t);

  if (notifsEnabled && Notification.permission === 'granted') {
    if (overdue.length) {
      new Notification('⚑ Tareas vencidas', {
        body: `Tienes ${overdue.length} tarea${overdue.length>1?'s':''} vencida${overdue.length>1?'s':''}: ${overdue.slice(0,2).map(x=>x.title).join(', ')}`,
        icon: 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32"><rect width="32" height="32" rx="8" fill="%230f0f0f"/><text x="16" y="22" text-anchor="middle" font-size="18" fill="%23c8b89a">✦</text></svg>'
      });
    }
    if (todayT.length) {
      setTimeout(() => {
        new Notification('◎ Para hoy', {
          body: todayT.slice(0,2).map(x=>x.title).join('\n'),
          icon: 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32"><rect width="32" height="32" rx="8" fill="%230f0f0f"/><text x="16" y="22" text-anchor="middle" font-size="18" fill="%23c8b89a">✦</text></svg>'
        });
      }, 1200);
    }
  }
}

// Toast
function toast(title, body, color) {
  const area = document.getElementById('toastArea');
  const el = document.createElement('div');
  el.className = 'toast';
  el.innerHTML = `<div class="toast-dot" style="background:${color||'var(--green)'}"></div><div><div style="font-weight:500">${title}</div>${body?`<div style="color:var(--text2);font-size:11px;margin-top:2px">${body}</div>`:''}</div>`;
  area.appendChild(el);
  setTimeout(() => el.remove(), 3500);
}

// Keyboard
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
  if ((e.ctrlKey || e.metaKey) && e.key === 'k') { e.preventDefault(); openModal(); }
});

init();
</script>
</body>
</html>
